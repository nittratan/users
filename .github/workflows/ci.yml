name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      # Uncomment later
      # - name: Lint
      #   run: ruff check .
      #
      # - name: Format Check
      #   run: ruff format --check .

      - name: Run Tests
        run: pytest

  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false
          tags: |
            user-api:ci
            ${{ secrets.AZURE_REGISTRY }}/user-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start Container
        run: |
          docker run -d \
            --name user-api-ci \
            -p 8000:8000 \
            user-api:ci

      - name: Smoke Test
        run: |
          for attempt in {1..10}; do
            if curl --fail --silent http://127.0.0.1:8000/health; then
              echo "Health Check Passed"
              exit 0
            fi
            sleep 2
          done

          docker logs user-api-ci
          exit 1

      - name: Remove Test Container
        if: always()
        run: docker rm -f user-api-ci || true

      - name: Login to Azure Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.AZURE_REGISTRY }}
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

      - name: Push Docker Image
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ${{ secrets.AZURE_REGISTRY }}/user-api:latest